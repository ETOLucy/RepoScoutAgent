<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RepoScout Agent</title>
  <style>
    :root{--ink:#17221d;--muted:#68756e;--line:#dbe3de;--bg:#f4f6f5;--panel:#fff;--green:#136f50;--soft:#e8f3ed;--amber:#9b5b16}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.55 Inter,"Microsoft YaHei",system-ui,sans-serif}button,textarea{font:inherit}
    .app{height:100vh;display:grid;grid-template-columns:220px minmax(0,1fr)}aside{background:#17251f;color:#fff;padding:22px 16px;display:flex;flex-direction:column}.brand{font-size:17px;font-weight:750;display:flex;align-items:center;gap:10px}.mark{width:30px;height:30px;background:#59ca97;color:#10231a;display:grid;place-items:center;border-radius:6px}.new{margin-top:28px;width:100%;border:1px solid #496057;background:transparent;color:#fff;padding:9px 10px;text-align:left;cursor:pointer;border-radius:5px}.side-note{margin-top:auto;color:#9bada5;font-size:12px}.dot{display:inline-block;width:7px;height:7px;background:#54c795;border-radius:50%;margin-right:7px}
    main{min-width:0;height:100vh;display:grid;grid-template-rows:60px minmax(0,1fr) auto}.top{background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 26px}.top strong{font-size:16px}.session{font-size:12px;color:var(--muted)}
    .thread{overflow:auto;padding:28px max(20px,calc((100% - 1050px)/2));scroll-behavior:smooth}.welcome{padding:45px 0 25px}.welcome h1{font-size:25px;margin:0 0 5px}.welcome p{color:var(--muted);margin:0}.message{margin:18px 0}.user{display:flex;justify-content:flex-end}.user .bubble{max-width:72%;background:#1d6f53;color:#fff;padding:11px 14px;border-radius:6px}.assistant{padding-right:5%}.agent-head{display:flex;align-items:center;gap:8px;font-weight:700;margin-bottom:8px}.agent-mark{width:24px;height:24px;display:grid;place-items:center;background:var(--soft);color:var(--green);border-radius:4px}.progress{color:var(--muted);padding:8px 0}.report{color:#35423c}.warning{color:var(--amber);margin-top:7px}.details{margin-top:12px;border-top:1px solid var(--line);padding-top:10px}.details summary{cursor:pointer;color:var(--green)}.strategy{padding:7px 0;border-bottom:1px solid #e9eeeb}.strategy strong{color:var(--green)}.small{font-size:12px;color:var(--muted)}
    .results{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px}.repo-card{background:#fff;border:1px solid var(--line);padding:15px;min-width:0;border-radius:6px}.repo-head{display:flex;justify-content:space-between;gap:10px}.repo-name{font-weight:750;color:var(--green);text-decoration:none;overflow-wrap:anywhere}.score{font-size:12px;white-space:nowrap;background:var(--soft);color:var(--green);padding:2px 6px;border-radius:4px}.desc{color:#4f5e56;margin:8px 0}.meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:12px}.criteria{margin:10px 0 0;padding:9px 0 0 18px;border-top:1px solid #edf0ee}.criteria li+li{margin-top:7px}.implemented{color:var(--green)}.risk{color:var(--amber);font-size:12px;margin-top:8px}
    .composer-wrap{background:linear-gradient(transparent,var(--bg) 18%);padding:18px max(20px,calc((100% - 900px)/2)) 22px}.composer{background:#fff;border:1px solid #cfd9d3;display:grid;grid-template-columns:1fr auto;align-items:end;padding:10px;border-radius:6px;box-shadow:0 4px 18px rgba(23,37,31,.08)}textarea{border:0;outline:0;resize:none;min-height:48px;max-height:150px;padding:7px;width:100%;color:var(--ink)}.send{width:38px;height:38px;border:0;background:var(--green);color:#fff;border-radius:5px;cursor:pointer;font-size:19px}.send:disabled{opacity:.45}.error{color:#a13d2e}
    @media(max-width:760px){.app{grid-template-columns:1fr}aside{display:none}.top{padding:0 16px}.thread{padding:18px 14px}.user .bubble{max-width:88%}.assistant{padding-right:0}.results{grid-template-columns:1fr}.composer-wrap{padding:12px}.session{display:none}}
  </style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand"><div class="mark">R</div><span>RepoScout</span></div>
    <button class="new" id="new-chat" title="开始新对话">＋ 新对话</button>
    <div class="side-note"><span class="dot"></span>Agent 在线<br><br>L1 文档证据<br>L2 静态实现验证</div>
  </aside>
  <main>
    <header class="top"><strong>GitHub 项目发现 Agent</strong><span class="session" id="session">新会话</span></header>
    <section class="thread" id="thread">
      <div class="welcome" id="welcome"><h1>你想找什么项目？</h1><p>说明目标、使用场景和真正重要的约束。</p></div>
    </section>
    <div class="composer-wrap">
      <form class="composer" id="form">
        <textarea id="message" placeholder="输入需求或继续补充条件…" required></textarea>
        <button class="send" id="send" title="发送" aria-label="发送">↑</button>
      </form>
    </div>
  </main>
</div>
<script>
  const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const thread=document.getElementById("thread"),input=document.getElementById("message"),send=document.getElementById("send");
  let conversationId=null,busy=false;
  const progressLabel={validate_request:"正在校验需求",understand_requirement:"正在理解目标并制定检索假设",plan_search:"正在编译 GitHub 查询",search_github:"正在扩大候选集",rank_candidates:"正在进行仓库级语义重排",inspect_documents:"正在读取候选仓库证据",prepare_evidence:"正在批量编码证据并筛选分析候选",match_documents:"正在并发验证文档与静态实现",generate_report:"正在整理推荐结果"};
  const scroll=()=>thread.scrollTop=thread.scrollHeight;
  const addUser=text=>{document.getElementById("welcome")?.remove();const el=document.createElement("div");el.className="message user";el.innerHTML=`<div class="bubble">${esc(text)}</div>`;thread.appendChild(el);scroll()};
  const addAgent=()=>{const el=document.createElement("div");el.className="message assistant";el.innerHTML='<div class="agent-head"><span class="agent-mark">R</span>RepoScout</div><div class="progress">正在开始…</div>';thread.appendChild(el);scroll();return el};
  const renderResults=data=>data.recommendations?.length?`<div class="results">${data.recommendations.map(repo=>`<article class="repo-card"><div class="repo-head"><a class="repo-name" href="${esc(repo.url)}" target="_blank" rel="noreferrer">${esc(repo.full_name)}</a><span class="score">${esc(repo.score)} 分</span></div><div class="desc">${esc(repo.summary||repo.description)}</div><div class="meta"><span>★ ${esc(repo.stars)}</span><span>${esc(repo.language||"未知语言")}</span><span>${esc(repo.license)}</span></div>${repo.criteria?.length?`<ul class="criteria">${repo.criteria.map(item=>`<li><strong>${esc(item.status)}</strong> · ${esc(item.requirement_id)}${item.evidence?`<br><span class="small">${esc(item.evidence)} · ${esc(item.source_path)}</span>`:""}<br><span class="implemented">${esc(item.implementation_status)}</span>${item.implementation_evidence?` <span class="small">· ${esc(item.implementation_evidence)} · ${esc(item.implementation_source_path)}</span>`:""}</li>`).join("")}</ul>`:""}${repo.risks?.length?`<div class="risk">${repo.risks.map(esc).join(" · ")}</div>`:""}</article>`).join("")}</div>`:"";
  const renderAgent=(el,data)=>{const intent=data.search_intent||{},strategies=intent.search_strategies||[];el.innerHTML=`<div class="agent-head"><span class="agent-mark">R</span>RepoScout <span class="small">第 ${esc(data.turn)} 轮</span></div><div class="report">${esc(data.report||data.error||"没有找到可展示的结果")}</div>${data.warnings?.length?`<div class="warning">${data.warnings.map(esc).join(" · ")}</div>`:""}${Object.keys(intent).length?`<details class="details"><summary>查看本轮任务契约与搜索假设</summary><div class="strategy"><strong>目标</strong><br>${esc(intent.goal)}</div>${strategies.map(item=>`<div class="strategy"><strong>${esc(item.strategy_type)}</strong> · ${item.terms.map(esc).join(" + ")}<br><span class="small">${esc(item.hypothesis||item.rationale)}</span></div>`).join("")}</details>`:""}${renderResults(data)}`;scroll()};
  const stream=async(message,agent)=>{const response=await fetch("/api/search/stream",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({requirement:message,conversation_id:conversationId})});if(!response.ok||!response.body)throw new Error(`服务返回 ${response.status}`);const reader=response.body.getReader(),decoder=new TextDecoder();let buffer="",result=null;while(true){const {value,done}=await reader.read();buffer+=decoder.decode(value||new Uint8Array(),{stream:!done});const frames=buffer.split("\n\n");buffer=frames.pop()||"";for(const frame of frames){let event="",payload="";for(const line of frame.split("\n")){if(line.startsWith("event: "))event=line.slice(7);if(line.startsWith("data: "))payload+=line.slice(6)}if(!payload)continue;const data=JSON.parse(payload);if(event==="progress"){const timing=data.duration_ms?` · ${(data.duration_ms/1000).toFixed(1)}s`:"";const preview=data.candidates?.length?`<div class="small">暂定候选：${data.candidates.map(item=>esc(item.full_name)).join(" · ")}</div>`:"";const count=data.analysis_count?`<div class="small">${data.analysis_count} 个候选进入证据验证</div>`:"";agent.querySelector(".progress").innerHTML=`${esc(progressLabel[data.node]||"Agent 正在执行")}${timing}${preview}${count}`;scroll()}if(event==="result")result=data;if(event==="error")throw new Error(data.error||"执行失败")}if(done)break}if(!result)throw new Error("服务没有返回结果");return result};
  document.getElementById("form").addEventListener("submit",async event=>{event.preventDefault();if(busy)return;const message=input.value.trim();if(!message)return;busy=true;send.disabled=true;input.value="";addUser(message);const agent=addAgent();try{const data=await stream(message,agent);conversationId=data.conversation_id;document.getElementById("session").textContent=`会话 · ${conversationId.slice(0,8)}`;renderAgent(agent,data)}catch(error){agent.innerHTML=`<div class="agent-head"><span class="agent-mark">R</span>RepoScout</div><div class="error">${esc(error.message)}。可以直接重试，本轮对话仍会保留。</div>`}finally{busy=false;send.disabled=false;input.focus();scroll()}});
  input.addEventListener("keydown",event=>{if(event.key==="Enter"&&!event.shiftKey){event.preventDefault();document.getElementById("form").requestSubmit()}});
  document.getElementById("new-chat").addEventListener("click",async()=>{if(busy)return;if(conversationId)await fetch(`/api/conversations/${encodeURIComponent(conversationId)}`,{method:"DELETE"});conversationId=null;thread.innerHTML='<div class="welcome" id="welcome"><h1>你想找什么项目？</h1><p>说明目标、使用场景和真正重要的约束。</p></div>';document.getElementById("session").textContent="新会话";input.focus()});
</script>
</body>
</html>
