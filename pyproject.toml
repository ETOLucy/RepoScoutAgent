[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--strict-markers --cov=src/reposcout --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
branch = true

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
files = ["main.py", "src"]
check_untyped_defs = true
disallow_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_unused_configs = true
exclude = [".venv", "tests"]
